<!-- @dsCard group="Type" viewport="700x170" name="Cinzel — labels & nav" subtitle="Roman capitals for eyebrows, nav, buttons — always tracked & uppercase" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--cream); padding: 22px 26px; }
  .eyebrow { font-family: var(--font-label); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--crimson); margin: 0 0 16px; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .lab { font-family: var(--font-label); text-transform: uppercase; color: var(--navy); }
  .l1 { font-size: 22px; letter-spacing: 0.12em; font-weight: 600; }
  .l2 { font-size: 13px; letter-spacing: 0.2em; color: var(--crimson); }
  .meta { font-family: var(--font-body); font-size: 12px; color: var(--text-muted); margin-top: 16px; }
</style>
</head>
<body>
  <p class="eyebrow">Label · Cinzel</p>
  <div class="stack">
    <div class="lab l1">Teaching &amp; Learning</div>
    <div class="lab l2">Our Foundation</div>
  </div>
  <p class="meta">--font-label · uppercase · tracking 0.12–0.2em · weights 400–700</p>
</body>
</html>
