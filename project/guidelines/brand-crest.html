<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--cream); display: flex; align-items: center; gap: 28px; padding: 24px 30px; }
  .crest { width: 150px; height: auto; }
  .crest.dark { background: var(--navy); padding: 12px; border-radius: var(--radius-lg); }
  h3 { font-family: var(--font-display); color: var(--navy); font-size: 22px; margin: 0 0 6px; }
  p { font-family: var(--font-body); color: var(--text-muted); font-size: 13px; line-height: 1.6; margin: 0; max-width: 34ch; }
  .motto { font-family: var(--font-display); font-style: italic; color: var(--crimson); font-size: 15px; margin-top: 10px; }
</style>
</head>
<body>
  <img class="crest" src="../assets/logo-full.png" alt="St Philomena School crest">
  <img class="crest dark" src="../assets/logo-full.png" alt="St Philomena School crest on navy">
  <div>
    <h3>St Philomena School</h3>
    <p>The crest carries the school's "P", the fern and olive branch, and the motto banner. Transparent ground — sits on cream or navy.</p>
    <div class="motto">Sine Deo Nihil</div>
  </div>
</body>
</html>
