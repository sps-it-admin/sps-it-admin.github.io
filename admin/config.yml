  - name: "day_school_pages"
    label: "Day School — Pages"
    files:
      - name: "ds_home"
        label: "Home"
        file: "day-school/index.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "day-school"}
          - {label: "Nav", name: "nav", widget: "hidden", default: "home"}
          - {label: "Meta Description", name: "description", widget: "text"}
          - label: "Hero"
            name: "hero"
            widget: "object"
            collapsed: false
            fields:
              - {label: "Background Image", name: "image", widget: "image"}
              - {label: "Image Alt Text", name: "image_alt", widget: "string"}
              - {label: "Eyebrow", name: "eyebrow", widget: "string"}
              - {label: "Heading (line 1)", name: "heading", widget: "string"}
              - {label: "Heading (line 2, italic)", name: "heading_em", widget: "string", required: false}
              - {label: "Subtext", name: "subtext", widget: "text"}
              - {label: "Primary Button Label", name: "primary_label", widget: "string"}
              - {label: "Primary Button Link", name: "primary_link", widget: "string"}
              - {label: "Secondary Button Label", name: "secondary_label", widget: "string"}
              - {label: "Secondary Button Link", name: "secondary_link", widget: "string"}
          - label: "Motto Band"
            name: "motto"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Eyebrow", name: "eyebrow", widget: "string"}
              - {label: "Latin", name: "latin", widget: "string"}
              - {label: "English", name: "english", widget: "string"}
          - label: "Video Showcase"
            name: "video"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Eyebrow", name: "eyebrow", widget: "string"}
              - {label: "Heading", name: "heading", widget: "string"}
              - {label: "YouTube Embed URL", name: "embed_url", widget: "string", hint: "Use the /embed/ form of the YouTube URL."}
          - label: "Statistics"
            name: "stats"
            widget: "list"
            fields:
              - {label: "Value", name: "value", widget: "string"}
              - {label: "Label", name: "label", widget: "string"}
          - label: "Pillars"
            name: "pillars"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Eyebrow", name: "eyebrow", widget: "string"}
              - {label: "Heading", name: "heading", widget: "string"}
              - label: "Cards"
                name: "cards"
                widget: "list"
                fields:
                  - {label: "Title", name: "title", widget: "string"}
                  - {label: "Body", name: "body", widget: "text"}
          - label: "Call to Action"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Heading", name: "heading", widget: "string"}
              - {label: "Body", name: "body", widget: "text"}
              - {label: "Button Label", name: "button_label", widget: "string"}
              - {label: "Button Link", name: "button_link", widget: "string"}

