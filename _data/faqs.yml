items:
  - question: "What year levels does Distance Learning cover?"
    answer: "St Philomena School's Distance Learning programme covers Years 7 and 8, corresponding to the Grammar Phase and Logic Phase of our classical curriculum."
  - question: "Do I need to be Catholic to enrol?"
    answer: "Our programme is designed for Catholic families seeking an authentically Catholic classical education. Families must be committed to supporting the school's Catholic philosophy and standards."
  - question: "How does the Distance Learning programme work?"
    answer: "Students receive structured lesson materials, regular teacher contact, and access to the full curriculum from our Park Ridge campus. The programme is delivered via correspondence and online communication."
  - question: "What is the cost of the programme?"
    answer: "Tuition fees are set annually. Please contact the Distance Learning office for current fee information and details about the Textbook Hire Scheme."
  - question: "Are government funding options available?"
    answer: "St Philomena School is an independent Catholic school. Government funding may be available to eligible students. Please enquire with the Distance Learning office for details."
  - question: "When does the school year begin?"
    answer: "The Distance Learning programme follows the Queensland school calendar. Enrolled students receive their lesson materials and timetable prior to the start of each term."
