      - name: "bus_transport"
        label: "Bus Transport Document"
        file: "_data/day_school_bus_transport.yml"
        fields:
          - {label: "Bus Transport Document", name: "document", widget: "file", required: false, hint: "Upload the Bus Transport document (e.g. a PDF). The Bus Transport menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "day_school_school_calendar"
    label: "Day School — School Calendar"
    files:
      - name: "school_calendar"
        label: "School Calendar Document"
        file: "_data/day_school_school_calendar.yml"
        fields:
          - {label: "School Calendar Document", name: "document", widget: "file", required: false, hint: "Upload the School Calendar (e.g. a PDF). The School Calendar menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "day_school_classical_books"
    label: "Day School — Classical Books"
    files:
      - name: "classical_books"
        label: "Classical Books Document"
        file: "_data/day_school_classical_books.yml"
        fields:
          - {label: "Classical Books Document", name: "document", widget: "file", required: false, hint: "Upload the Classical Books document (e.g. a PDF). The Classical Books menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "day_school_accident_claim_form"
