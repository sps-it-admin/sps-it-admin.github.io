<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--navy); padding: 30px 40px; }
  .motto { font-family: var(--font-display); font-style: italic; font-size: 22px; color: var(--gold); padding: 0 16px; white-space: nowrap; }
  .sub { text-align: center; font-family: var(--font-label); font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-on-dark-muted); margin-top: 10px; }
</style>
</head>
<body>
  <div class="gold-divider"><span class="motto">"Sine Deo Nihil"</span></div>
  <p class="sub">Without God there is Nothing</p>
</body>
</html>
