<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation — restrained shadows" subtitle="Soft navy-tinted shadows; reserved mostly for hover" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--cream); padding: 26px 22px; }
  .row { display: flex; gap: 24px; }
  .item { text-align: center; flex: 1; }
  .box { height: 64px; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-lg); }
  .lab { font-family: var(--font-label); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--navy); margin-top: 12px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lab">sm</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lab">md</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lab">lg · hover</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="lab">xl</div></div>
  </div>
</body>
</html>
