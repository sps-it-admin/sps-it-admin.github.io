<!-- @dsCard group="Type" viewport="700x190" name="Playfair Display — headings" subtitle="High-contrast didone serif for display headings & titles" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--cream); padding: 22px 26px; }
  .eyebrow { font-family: var(--font-label); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--crimson); margin: 0 0 10px; }
  .spec { font-family: var(--font-display); color: var(--navy); line-height: 1.1; }
  .big { font-size: 44px; font-weight: 700; }
  .ital { font-style: italic; color: var(--crimson); }
  .meta { font-family: var(--font-body); font-size: 12px; color: var(--text-muted); margin-top: 14px; }
</style>
</head>
<body>
  <p class="eyebrow">Display · Playfair Display</p>
  <div class="spec big">An Education Rooted<br><span class="ital">in Truth &amp; Tradition</span></div>
  <p class="meta">--font-display · weights 400–900 · italic for emphasis · leading 1.15</p>
</body>
</html>
