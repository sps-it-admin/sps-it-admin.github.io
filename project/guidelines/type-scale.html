<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--cream); padding: 18px 26px; }
  .r { display: flex; align-items: baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .r:last-child { border-bottom: 0; }
  .t { font-family: var(--font-display); color: var(--navy); line-height: 1; white-space: nowrap; }
  .tag { font-family: var(--font-body); font-size: 11px; color: var(--text-muted); margin-left: auto; white-space: nowrap; }
</style>
</head>
<body>
  <div class="r"><span class="t" style="font-size:48px;font-weight:700">Aa</span><span class="t" style="font-size:48px;font-weight:700">Sine Deo Nihil</span><span class="tag">--text-4xl · 48px</span></div>
  <div class="r"><span class="t" style="font-size:30px;font-weight:600">Aa</span><span class="t" style="font-size:30px;font-weight:600">Forming Catholics</span><span class="tag">--text-2xl · 30px</span></div>
  <div class="r"><span class="t" style="font-size:19px">Aa</span><span class="t" style="font-size:19px">Lead paragraph copy</span><span class="tag">--text-lg · 19px</span></div>
  <div class="r"><span class="t" style="font-family:var(--font-body);font-size:17px">Aa</span><span class="t" style="font-family:var(--font-body);font-size:17px">Body default, set in Lora</span><span class="tag">--text-base · 17px</span></div>
  <div class="r"><span class="t" style="font-family:var(--font-label);font-size:12px;letter-spacing:0.2em;text-transform:uppercase">Aa</span><span class="t" style="font-family:var(--font-label);font-size:12px;letter-spacing:0.2em;text-transform:uppercase">Section label</span><span class="tag">--text-xs · 12px</span></div>
</body>
</html>
