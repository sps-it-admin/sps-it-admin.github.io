              - {label: "Heading", name: "heading", widget: "string"}
              - {label: "Photo", name: "image", widget: "image"}
              - {label: "Photo Alt Text", name: "image_alt", widget: "string"}
              - label: "Body Paragraphs"
                name: "body"
                widget: "list"
                fields:
                  - {label: "Paragraph", name: "text", widget: "text"}
              - {label: "Pull Quote", name: "quote", widget: "text"}
              - {label: "Signature Name", name: "signature_name", widget: "string"}
              - {label: "Signature Title", name: "signature_title", widget: "string"}
          - label: "Call to Action"
            name: "cta"
            widget: "object"
            collapsed: true
            fields:
              - {label: "Heading", name: "heading", widget: "string"}
              - {label: "Body", name: "body", widget: "text"}
