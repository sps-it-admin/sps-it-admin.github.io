<!-- @dsCard group="Colors" viewport="700x150" name="Cream & neutral grounds" subtitle="Warm parchment page grounds and card surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--cream); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; padding: 20px; }
  .sw { border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border-strong); }
  .chip { height: 84px; }
  .meta { padding: 8px 10px 10px; background: var(--white); }
  .name { font-family: var(--font-label); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--navy); }
  .val { font-family: var(--font-body); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--cream)"></div><div class="meta"><div class="name">Cream</div><div class="val">--cream · page</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cream-dark)"></div><div class="meta"><div class="name">Cream Dark</div><div class="val">--cream-dark · alt</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--white)"></div><div class="meta"><div class="name">White</div><div class="val">--white · card</div></div></div>
  </div>
</body>
</html>
