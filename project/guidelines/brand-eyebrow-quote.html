<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--cream); padding: 24px 30px; }
  .q { font-family: var(--font-display); font-style: italic; font-size: 19px; color: var(--navy); margin: 0; }
  .cite { font-family: var(--font-label); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-top: 8px; }
</style>
</head>
<body>
  <p class="section-label">Our Philosophy</p>
  <blockquote class="crimson-rule" style="margin: 16px 0 0;">
    <p class="q">"The most important part of education is the formation of character."</p>
    <div class="cite">— Fr Joseph Ockerse, Principal</div>
  </blockquote>
</body>
</html>
