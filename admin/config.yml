backend:
  name: github
  repo: sps-it-admin/sps-it-admin.github.io
  branch: main

media_folder: "project/assets"
public_folder: "/project/assets"

collections:
  - name: "site_settings"
    label: "Site Settings"
    files:
      - name: "contact"
        label: "Contact Information"
        file: "_data/settings.yml"
        fields:
          - {label: "Phone", name: "phone", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Address Line 1", name: "address_line1", widget: "string"}
          - {label: "Address Line 2", name: "address_line2", widget: "string"}
          - {label: "Copyright Year", name: "copyright_year", widget: "string"}

  - name: "day_school_staff"
    label: "Day School — Our Staff"
    files:
      - name: "staff"
        label: "Staff Members"
        file: "_data/day_school_staff.yml"
        fields:
          - name: "members"
            label: "Staff Members"
            widget: "list"
            fields:
              - {label: "Name", name: "name", widget: "string"}
              - {label: "Role / Subject", name: "role", widget: "string"}
              - {label: "Department", name: "department", widget: "select", options: ["Leadership", "Executive & Administration", "Primary Teaching Staff", "Secondary Teaching Staff", "Specialist Teaching Staff", "Support Staff"]}
              - {label: "Photo", name: "photo", widget: "image", required: false}
              - {label: "Bio", name: "bio", widget: "text", required: false}

  - name: "day_school_annual_report"
    label: "Day School — Annual Report"
    files:
      - name: "annual_report"
        label: "Annual Report Document"
        file: "_data/day_school_annual_report.yml"
        fields:
          - {label: "Annual Report Document", name: "document", widget: "file", required: false, hint: "Upload the Annual Report (e.g. a PDF). The Annual Report menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "day_school_prospectus"
    label: "Day School — Prospectus & Handbook"
    files:
      - name: "prospectus"
        label: "Prospectus & Handbook Document"
        file: "_data/day_school_prospectus.yml"
        fields:
          - {label: "Prospectus & Handbook Document", name: "document", widget: "file", required: false, hint: "Upload the Prospectus & Handbook (e.g. a PDF). The Prospectus & Handbook menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "day_school_fee_schedule"
    label: "Day School — Fee Schedule"
    files:
      - name: "fee_schedule"
        label: "Fee Schedule Document"
        file: "_data/day_school_fee_schedule.yml"
        fields:
          - {label: "Fee Schedule Document", name: "document", widget: "file", required: false, hint: "Upload the Fee Schedule (e.g. a PDF). The Fee Schedule menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "day_school_bus_transport"
    label: "Day School — Bus Transport"
    files:
      - name: "bus_transport"
        label: "Bus Transport Document"
        file: "_data/day_school_bus_transport.yml"
        fields:
          - {label: "Bus Transport Document", name: "document", widget: "file", required: false, hint: "Upload the Bus Transport document (e.g. a PDF). The Bus Transport menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "day_school_classical_books"
    label: "Day School — Classical Books"
    files:
      - name: "classical_books"
        label: "Classical Books Document"
        file: "_data/day_school_classical_books.yml"
        fields:
          - {label: "Classical Books Document", name: "document", widget: "file", required: false, hint: "Upload the Classical Books document (e.g. a PDF). The Classical Books menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "faq_data"
    label: "FAQ Items"
    files:
      - name: "faqs"
        label: "Frequently Asked Questions"
        file: "_data/faqs.yml"
        fields:
          - name: "items"
            label: "FAQ Items"
            widget: "list"
            fields:
              - {label: "Question", name: "question", widget: "string"}
              - {label: "Answer", name: "answer", widget: "markdown"}

  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home"
        file: "index.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "default"}
          - {label: "Nav", name: "nav", widget: "hidden", default: "home"}
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "description", widget: "text"}
          - {label: "Hero Eyebrow", name: "hero_eyebrow", widget: "string"}
          - {label: "Hero Heading Line 1", name: "hero_h1", widget: "string"}
          - {label: "Hero Heading Line 2 (italic)", name: "hero_h1_em", widget: "string"}
          - {label: "Hero Description", name: "hero_desc", widget: "text"}

      - name: "about"
        label: "About"
        file: "about.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "default"}
          - {label: "Nav", name: "nav", widget: "hidden", default: "about"}
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "description", widget: "text"}
          - {label: "Page Hero Label", name: "page_hero_label", widget: "string"}
          - {label: "Page Hero Heading", name: "page_hero_heading", widget: "string"}

      - name: "teaching"
        label: "Teaching & Learning"
        file: "teaching.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "default"}
          - {label: "Nav", name: "nav", widget: "hidden", default: "teaching"}
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Page Hero Label", name: "page_hero_label", widget: "string"}
          - {label: "Page Hero Heading", name: "page_hero_heading", widget: "string"}

      - name: "enrol"
        label: "Enrolments"
        file: "enrol.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "default"}
          - {label: "Nav", name: "nav", widget: "hidden", default: "enrol"}
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "description", widget: "text"}
          - {label: "Page Hero Label", name: "page_hero_label", widget: "string"}
          - {label: "Page Hero Heading", name: "page_hero_heading", widget: "string"}

      - name: "community"
        label: "Community"
        file: "community.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "default"}
          - {label: "Nav", name: "nav", widget: "hidden", default: "community"}
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Page Hero Label", name: "page_hero_label", widget: "string"}
          - {label: "Page Hero Heading", name: "page_hero_heading", widget: "string"}

      - name: "day_school_our_staff"
        label: "Day School — Our Staff"
        file: "day-school/our-staff.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "day-school"}
          - {label: "Nav", name: "nav", widget: "hidden", default: "about"}
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "description", widget: "text"}
          - {label: "Page Hero Label", name: "page_hero_label", widget: "string"}
          - {label: "Page Hero Heading", name: "page_hero_heading", widget: "string"}
          - {label: "Section Eyebrow", name: "staff_eyebrow", widget: "string", required: false}
          - {label: "Section Heading", name: "staff_heading", widget: "string", required: false}
          - {label: "Section Intro", name: "staff_intro", widget: "text", required: false}

      - name: "faq"
        label: "FAQ"
        file: "faq.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "default"}
          - {label: "Nav", name: "nav", widget: "hidden", default: "faq"}
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Page Hero Label", name: "page_hero_label", widget: "string"}
          - {label: "Page Hero Heading", name: "page_hero_heading", widget: "string"}
