        fields:
          - {label: "Insured Authorization Form Document", name: "document", widget: "file", required: false, hint: "Upload the Insured Authorization Form (e.g. a PDF). The Insured Authorization Form menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "day_school_declaration_authority_form"
    label: "Day School — Declaration Information Authority Form"
    files:
      - name: "declaration_authority_form"
        label: "Declaration Information Authority Form Document"
        file: "_data/day_school_declaration_authority_form.yml"
        fields:
          - {label: "Declaration Information Authority Form Document", name: "document", widget: "file", required: false, hint: "Upload the Declaration Information Authority Form (e.g. a PDF). The Declaration Information Authority Form menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "day_school_student_safety_wellbeing_policy"
    label: "Day School — Student Safety and Wellbeing Policy"
    files:
      - name: "student_safety_wellbeing_policy"
        label: "Student Safety and Wellbeing Policy Document"
        file: "_data/day_school_student_safety_wellbeing_policy.yml"
        fields:
          - {label: "Student Safety and Wellbeing Policy Document", name: "document", widget: "file", required: false, hint: "Upload the Student Safety and Wellbeing Policy (e.g. a PDF). The Student Safety and Wellbeing Policy menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "day_school_whistle_blower_policy"
    label: "Day School — Whistle Blower Policy"
    files:
      - name: "whistle_blower_policy"
        label: "Whistle Blower Policy Document"
        file: "_data/day_school_whistle_blower_policy.yml"
        fields:
          - {label: "Whistle Blower Policy Document", name: "document", widget: "file", required: false, hint: "Upload the Whistle Blower Policy (e.g. a PDF). The Whistle Blower Policy menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "day_school_complaints_handling_policy"
    label: "Day School — Complaints Handling Policy"
    files:
      - name: "complaints_handling_policy"
        label: "Complaints Handling Policy Document"
        file: "_data/day_school_complaints_handling_policy.yml"
        fields:
          - {label: "Complaints Handling Policy Document", name: "document", widget: "file", required: false, hint: "Upload the Complaints Handling Policy (e.g. a PDF). The Complaints Handling Policy menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "day_school_privacy_policy"
    label: "Day School — Privacy Policy"
    files:
      - name: "privacy_policy"
        label: "Privacy Policy Document"
        file: "_data/day_school_privacy_policy.yml"
        fields:
          - {label: "Privacy Policy Document", name: "document", widget: "file", required: false, hint: "Upload the Privacy Policy (e.g. a PDF). The Privacy Policy menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "day_school_workplace_health_safety"
    label: "Day School — Workplace Health and Safety"
    files:
      - name: "workplace_health_safety"
        label: "Workplace Health and Safety Document"
        file: "_data/day_school_workplace_health_safety.yml"
        fields:
          - {label: "Workplace Health and Safety Document", name: "document", widget: "file", required: false, hint: "Upload the Workplace Health and Safety document (e.g. a PDF). The Workplace Health and Safety menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "day_school_distance_education_announcement"
    label: "Day School — Distance Education Announcement"
    files:
      - name: "distance_education_announcement"
        label: "Distance Education Announcement Document"
        file: "_data/day_school_distance_education_announcement.yml"
        fields:
          - {label: "Distance Education Announcement Document", name: "document", widget: "file", required: false, hint: "Upload the Distance Education Announcement (e.g. a PDF). The Announcement menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "day_school_campus"
    label: "Day School — Our Campus"
    files:
      - name: "campus"
        label: "Our Campus Images"
        file: "_data/day_school_campus.yml"
        fields:
          - {label: "Featured Image", name: "featured_image", widget: "image", required: false, hint: "Large image shown at the top of the Our Campus gallery. Leave empty to hide it."}
          - {label: "Campus Photo 1", name: "campus_photo_1", widget: "image", required: false, hint: "Shown in the campus photo grid. Leave empty to hide it."}
          - {label: "Campus Photo 2", name: "campus_photo_2", widget: "image", required: false, hint: "Shown in the campus photo grid. Leave empty to hide it."}
          - {label: "Campus Photo 3", name: "campus_photo_3", widget: "image", required: false, hint: "Shown in the campus photo grid. Leave empty to hide it."}
          - {label: "Campus Photo 4", name: "campus_photo_4", widget: "image", required: false, hint: "Shown in the campus photo grid. Leave empty to hide it."}
          - {label: "Master Plan 1", name: "masterplan_1", widget: "image", required: false, hint: "Master plan image shown in the campus grid. Leave empty to hide it."}
          - {label: "Master Plan 2", name: "masterplan_2", widget: "image", required: false, hint: "Master plan image shown in the campus grid. Leave empty to hide it."}

  - name: "day_school_pledge_your_support"
    label: "Day School — Pledge Your Support"
    files:
      - name: "pledge_your_support"
        label: "Pledge Your Support Page"
        file: "_data/day_school_pledge_your_support.yml"
        fields:
          - {label: "Photo", name: "photo", widget: "image", required: false, hint: "Photo shown on the Pledge Your Support page. Leave empty to hide it."}
          - {label: "Download Full Brochure — document", name: "brochure_document", widget: "file", required: false, hint: "Upload the fundraiser brochure (e.g. a PDF). The 'Download Full Brochure' button links to this file and opens it in a new tab. Leave empty to hide the button."}
          - {label: "ANZ Direct Debit Authorisation Request Form — document", name: "direct_debit_request_document", widget: "file", required: false, hint: "Upload the ANZ Direct Debit Authorisation Request Form (e.g. a PDF). The matching button links to this file and opens it in a new tab. Leave empty to hide the button."}
          - {label: "ANZ Direct Debit Agreement — document", name: "direct_debit_agreement_document", widget: "file", required: false, hint: "Upload the ANZ Direct Debit Service Agreement (e.g. a PDF). The matching button links to this file and opens it in a new tab. Leave empty to hide the button."}

  - name: "distance_learning_fee_schedule"
    label: "Distance Learning — Fee Schedule"
    files:
      - name: "fee_schedule"
        label: "Fee Schedule Document"
        file: "_data/distance_learning_fee_schedule.yml"
        fields:
          - {label: "Fee Schedule Document", name: "document", widget: "file", required: false, hint: "Upload the Distance Learning Fee Schedule (e.g. a PDF). The Fee Schedule menu item will link to this file and open it in a new tab. Leave empty to keep the menu item inactive."}

  - name: "faq_data"
    label: "FAQ Items"
    files:
      - name: "faqs"
        label: "Frequently Asked Questions"
        file: "_data/faqs.yml"
        fields:
          - name: "items"
            label: "FAQ Items"
            widget: "list"
            fields:
              - {label: "Question", name: "question", widget: "string"}
              - {label: "Answer", name: "answer", widget: "markdown"}

  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home"
        file: "index.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "default"}
          - {label: "Nav", name: "nav", widget: "hidden", default: "home"}
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "description", widget: "text"}
          - {label: "Hero Eyebrow", name: "hero_eyebrow", widget: "string"}
          - {label: "Hero Heading Line 1", name: "hero_h1", widget: "string"}
          - {label: "Hero Heading Line 2 (italic)", name: "hero_h1_em", widget: "string"}
          - {label: "Hero Description", name: "hero_desc", widget: "text"}

      - name: "about"
        label: "About"
        file: "about.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "default"}
          - {label: "Nav", name: "nav", widget: "hidden", default: "about"}
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "description", widget: "text"}
          - {label: "Page Hero Label", name: "page_hero_label", widget: "string"}
          - {label: "Page Hero Heading", name: "page_hero_heading", widget: "string"}

      - name: "teaching"
        label: "Teaching & Learning"
        file: "teaching.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "default"}
          - {label: "Nav", name: "nav", widget: "hidden", default: "teaching"}
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Page Hero Label", name: "page_hero_label", widget: "string"}
          - {label: "Page Hero Heading", name: "page_hero_heading", widget: "string"}

      - name: "enrol"
        label: "Enrolments"
        file: "enrol.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "default"}
          - {label: "Nav", name: "nav", widget: "hidden", default: "enrol"}
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "description", widget: "text"}
          - {label: "Page Hero Label", name: "page_hero_label", widget: "string"}
          - {label: "Page Hero Heading", name: "page_hero_heading", widget: "string"}

      - name: "community"
        label: "Community"
        file: "community.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "default"}
          - {label: "Nav", name: "nav", widget: "hidden", default: "community"}
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Page Hero Label", name: "page_hero_label", widget: "string"}
          - {label: "Page Hero Heading", name: "page_hero_heading", widget: "string"}

      - name: "day_school_our_staff"
        label: "Day School — Our Staff"
        file: "day-school/our-staff.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "day-school"}
          - {label: "Nav", name: "nav", widget: "hidden", default: "about"}
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "description", widget: "text"}
          - {label: "Page Hero Label", name: "page_hero_label", widget: "string"}
          - {label: "Page Hero Heading", name: "page_hero_heading", widget: "string"}
          - {label: "Section Eyebrow", name: "staff_eyebrow", widget: "string", required: false}
          - {label: "Section Heading", name: "staff_heading", widget: "string", required: false}
          - {label: "Section Intro", name: "staff_intro", widget: "text", required: false}

      - name: "faq"
        label: "FAQ"
        file: "faq.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "default"}
          - {label: "Nav", name: "nav", widget: "hidden", default: "faq"}
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Page Hero Label", name: "page_hero_label", widget: "string"}
          - {label: "Page Hero Heading", name: "page_hero_heading", widget: "string"}
