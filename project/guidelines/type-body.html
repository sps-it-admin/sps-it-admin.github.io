<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--cream); padding: 22px 26px; }
  .eyebrow { font-family: var(--font-label); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--crimson); margin: 0 0 10px; }
  p.body { font-family: var(--font-body); font-size: 17px; line-height: 1.75; color: var(--text-body); margin: 0; max-width: 60ch; }
  .meta { font-family: var(--font-body); font-size: 12px; color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <p class="eyebrow">Body · Lora</p>
  <p class="body">At St Philomena School, we value education not merely as a means to something else, but for its own sake. A true education forms the whole person — intellect, will, and character.</p>
  <p class="meta">--font-body · 17px / 1.75 · weights 400–700 · italic available</p>
</body>
</html>
