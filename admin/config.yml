            name: "listing"
            widget: "object"
            collapsed: true
            hint: "Shown above the posts."
            fields:
              - {label: "Eyebrow", name: "eyebrow", widget: "string"}
              - {label: "Heading", name: "heading", widget: "string"}
          - label: "News Posts"
            name: "posts"
            label_singular: "News Post"
            widget: "list"
            collapsed: true
            summary: "{{fields.title}}"
            hint: "Each item is shown on the News page, newest first by publish date. Leave the list empty to show the empty state below."
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Publish Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD"}
              - {label: "Featured Image", name: "image", widget: "image", required: false, hint: "Optional. Shown at the top of the post."}
              - {label: "Body", name: "body", widget: "markdown"}
          - label: "Empty State"
            name: "empty"
            widget: "object"
            collapsed: true
            hint: "Shown when there are no news posts yet."
            fields:
              - {label: "Quote", name: "quote", widget: "string"}
              - {label: "Body", name: "body", widget: "text"}
              - {label: "Button Label", name: "button_label", widget: "string"}
              - {label: "Button Link", name: "button_link", widget: "string"}

  - name: "pages"
    label: "Landing Page"
    files:
      - name: "home"
        label: "Home (Landing)"
        file: "index.html"
        fields:
          - {label: "Layout", name: "layout", widget: "hidden", default: "landing"}
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "description", widget: "text"}
          - label: "Brand Block"
            name: "brand"
            widget: "object"
            collapsed: false
            hint: "The crest and school name at the centre of the landing page."
            fields:
              - {label: "Crest Image", name: "crest_image", widget: "image"}
              - {label: "School Name", name: "school_name", widget: "string"}
              - {label: "Tagline", name: "tagline", widget: "string"}
              - {label: "Motto (Latin)", name: "motto", widget: "string"}
              - {label: "Motto (English)", name: "motto_en", widget: "string"}
          - {label: "Prompt", name: "prompt", widget: "string", hint: "The line above the two school cards, e.g. 'Please select your school'."}
          - label: "School Cards"
            name: "choices"
            widget: "list"
            hint: "The two cards linking to Day School and Distance Learning."
            fields:
              - {label: "Eyebrow", name: "eyebrow", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "desc", widget: "text"}
              - {label: "Call to Action", name: "cta", widget: "string"}
              - {label: "Link", name: "link", widget: "string"}
          - {label: "Footer Note", name: "footer_note", widget: "string", hint: "The small line of text at the very bottom."}

  - name: "site_settings"
    label: "Site Settings"
    files:
      - name: "contact"
        label: "Contact Information"
        file: "_data/settings.yml"
        fields:
          - label: "Day School"
            name: "day_school"
            widget: "object"
            hint: "Contact details shown across the Day School section."
            fields:
              - {label: "Phone", name: "phone", widget: "string"}
              - {label: "Email", name: "email", widget: "string"}
              - {label: "Address Line 1", name: "address_line1", widget: "string"}
              - {label: "Address Line 2", name: "address_line2", widget: "string"}
              - {label: "Copyright Year", name: "copyright_year", widget: "string"}
          - label: "Distance Learning"
            name: "distance_learning"
            widget: "object"
            hint: "Contact details shown across the Distance Learning section. The two programmes use different email addresses."
            fields:
              - {label: "Phone", name: "phone", widget: "string"}
              - {label: "Email", name: "email", widget: "string"}
              - {label: "Address Line 1", name: "address_line1", widget: "string"}
              - {label: "Address Line 2", name: "address_line2", widget: "string"}
              - {label: "Copyright Year", name: "copyright_year", widget: "string"}
